spring.application.name=jayas-organics-admin
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:jayas_organics}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:Vilva@123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500,null}
jwt.secret=${JWT_SECRET:ChangeThisDevelopmentJwtSecretKeyToSomethingLongAndSecure12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

logging.level.org.springframework.security=INFO

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jayas_organics}
      MYSQL_USER: ${MYSQL_USER:-jayas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_database_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/jayas_organics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-jayas}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_this_database_password}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-replace_with_a_real_admin_password}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      APP_AUTH_MAX_LOGIN_ATTEMPTS: ${APP_AUTH_MAX_LOGIN_ATTEMPTS:-5}
      APP_AUTH_BLOCK_MINUTES: ${APP_AUTH_BLOCK_MINUTES:-15}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_32_byte_or_longer_secret_value}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      LOG_FILE: ${LOG_FILE:-logs/application.log}
    ports:
      - "8080:8080"

volumes:
  mysql-data:

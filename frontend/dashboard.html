<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand header-brand" href="dashboard.html">Admin Panel</a>
      <div class="d-flex">
        <a class="btn btn-outline-secondary me-2" href="products.html">Products</a>
        <a class="btn btn-outline-secondary me-2" href="orders.html">Orders</a>
        <a class="btn btn-outline-secondary me-2" href="users.html">Users</a>
        <button class="btn btn-danger" id="logout">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container py-5">
    <div class="mb-4">
      <h1 class="page-heading">Dashboard</h1>
      <p class="text-muted">Overview of product, order and user counts.</p>
    </div>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5>Total Products</h5>
          <p class="display-6" id="product-count">0</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5>Total Orders</h5>
          <p class="display-6" id="order-count">0</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5>Total Users</h5>
          <p class="display-6" id="user-count">0</p>
        </div>
      </div>
    </div>
    <footer>
      <p>Admin panel with JWT authentication and secure Spring Boot backend.</p>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>

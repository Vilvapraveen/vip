<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="orders">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand header-brand" href="dashboard.html">Admin Panel</a>
      <div class="d-flex">
        <a class="btn btn-outline-secondary me-2" href="dashboard.html">Dashboard</a>
        <a class="btn btn-outline-secondary me-2" href="products.html">Products</a>
        <a class="btn btn-primary me-2" href="orders.html">Orders</a>
        <a class="btn btn-outline-secondary me-2" href="users.html">Users</a>
        <button class="btn btn-danger" id="logout">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container py-5">
    <div class="mb-4">
      <h1 class="page-heading">Order Management</h1>
      <p class="text-muted">View orders and update order status.</p>
    </div>
    <div class="table-responsive card p-3">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>User</th>
            <th>Status</th>
            <th>Total</th>
            <th>Created At</th>
            <th>Items</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="orders-table-body"></tbody>
      </table>
      <div class="d-flex flex-wrap" id="pagination"></div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>

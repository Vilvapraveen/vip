<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand header-brand" href="dashboard.html">Admin Panel</a>
      <div class="d-flex">
        <a class="btn btn-outline-secondary me-2" href="dashboard.html">Dashboard</a>
        <a class="btn btn-primary me-2" href="products.html">Products</a>
        <a class="btn btn-outline-secondary me-2" href="orders.html">Orders</a>
        <a class="btn btn-outline-secondary me-2" href="users.html">Users</a>
        <button class="btn btn-danger" id="logout">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container py-5">
    <div class="mb-4">
      <h1 class="page-heading">Product Management</h1>
      <p class="text-muted">Create, update and delete product records.</p>
    </div>

    <div class="form-section">
      <h5>Create or Edit Product</h5>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="product-name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Price</label>
            <input type="number" class="form-control" id="product-price" step="0.01" min="0" required>
          </div>
          <div class="col-md-12">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="product-description" rows="2"></textarea>
          </div>
          <div class="col-md-12">
            <label class="form-label">Image URL</label>
            <input type="url" class="form-control" id="product-image">
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-success">Save Product</button>
          <button type="reset" class="btn btn-outline-secondary ms-2">Reset</button>
        </div>
      </form>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="input-group w-50">
        <input type="search" id="search-query" class="form-control" placeholder="Search product name">
        <button type="button" id="search-button" class="btn btn-outline-primary">Search</button>
      </div>
    </div>

    <div class="table-responsive card p-3">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Description</th>
            <th>Image</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-table-body"></tbody>
      </table>
      <div class="d-flex flex-wrap" id="pagination"></div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>

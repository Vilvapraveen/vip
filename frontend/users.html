<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="users">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand header-brand" href="dashboard.html">Admin Panel</a>
      <div class="d-flex">
        <a class="btn btn-outline-secondary me-2" href="dashboard.html">Dashboard</a>
        <a class="btn btn-outline-secondary me-2" href="products.html">Products</a>
        <a class="btn btn-outline-secondary me-2" href="orders.html">Orders</a>
        <a class="btn btn-primary me-2" href="users.html">Users</a>
        <button class="btn btn-danger" id="logout">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container py-5">
    <div class="mb-4">
      <h1 class="page-heading">User Management</h1>
      <p class="text-muted">View and delete registered users.</p>
    </div>
    <div class="table-responsive card p-3">
      <div class="card p-3 mb-4" id="edit-user-form-card" style="display:none;">
  <h5>Edit User</h5>
  <input type="hidden" id="edit-user-id">
  <input type="text" id="edit-user-fullname" class="form-control mb-2" placeholder="Full Name">
  <input type="email" id="edit-user-email" class="form-control mb-2" placeholder="Email">
  <button class="btn btn-primary" onclick="saveUser()">Save</button>
  <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
</div>
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Full Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
